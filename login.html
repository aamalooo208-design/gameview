<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود به GameView</title>

<style>
body{
background:#121212;
color:white;
font-family:tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#1e1e1e;
padding:25px;
border-radius:15px;
width:320px;
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}
button{
width:100%;
padding:12px;
background:#00c8ff;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>🎮 ورود به GameView</h2>

<input type="text" placeholder="ایمیل یا شماره تلفن">

<button>ارسال کد</button>

</div>

</body>
</html>
