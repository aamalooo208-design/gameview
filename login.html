<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود به GameView</title>

<style>
body{
background:#121212;
color:white;
font-family:tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#1e1e1e;
padding:25px;
border-radius:15px;
width:320px;
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}
button{
width:100%;
padding:12px;
background:#00c8ff;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>🎮 ورود به GameView</h2>

<input id="email" type="email" placeholder="ایمیل">

<input id="password" type="password" placeholder="رمز عبور">

<button id="login">ورود</button>

<p id="message">آماده ورود...</p>
<button>ارسال کد</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl =
"https://wlavimsjtfjwoqotkzik.supabase.co";

const supabaseKey =
"sb_publishable_r1yIt4locU8U0HybHhlo5w_eGc3LRpg";

const supabaseClient =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

document
.getElementById("login")
.addEventListener("click", async function () {

  const email =
  document.getElementById("email").value.trim();

  const password =
  document.getElementById("password").value;

  const message =
  document.getElementById("message");

  if (!email || !password) {
    message.textContent =
    "ایمیل و رمز عبور را وارد کن ⚠️";
    return;
  }

  message.textContent =
  "در حال ورود... ⏳";

  const { data, error } =
  await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {

    message.textContent =
    "خطا: " + error.message;

  } else {

    message.textContent =
    "ورود موفق بود! 🎉";

    setTimeout(function () {
      window.location.href = "profile.html";
    }, 1000);

  }

});
</script>
</body>
</html>
